<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="main.css">
    <script src="script.js" defer></script>
</head>
<body>
    <div class="outer-edge">
        <div class="upper-part">
            <div class="display">7 + 9</div>
        </div>
        <div class="lower-part">
            <div class="left-part">
                <button class="left-button">1</button>
                <button class="left-button">2</button>
                <button class="left-button">3</button>
                <button class="left-button">4</button>
                <button class="left-button">5</button>
                <button class="left-button">6</button>
                <button class="left-button">7</button>
                <button class="left-button">8</button>
                <button class="left-button">9</button>
                <button class="left-button">0</button>
                <button class="right-button clear-button">clr</button>
            </div>
            <div class="right-part">
                <button class="right-button">+</button>
                <button class="right-button">-</button>
                <button class="right-button">x</button>
                <button class="right-button">/</button>
                <button class="right-button">=</button>
            </div>
        </div>
    </div>
</body>
</html>
